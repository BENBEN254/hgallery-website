<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog Post - HGALLERY</title>
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css"
    />
    <style>
      .post-section {
        padding: 40px 0 80px;
      }
      .post-grid {
        display: grid;
        grid-template-columns: 1fr 320px;
        gap: 40px;
      }
      .post-content {
        background: var(--white);
        border-radius: var(--radius-lg);
        padding: 40px;
        box-shadow: var(--shadow-md);
      }
      .post-content .featured-image {
        border-radius: var(--radius-md);
        overflow: hidden;
        margin-bottom: 24px;
      }
      .post-content .featured-image img {
        width: 100%;
        max-height: 500px;
        object-fit: cover;
      }
      .post-content .post-meta {
        display: flex;
        gap: 20px;
        font-size: 14px;
        color: var(--text-muted);
        margin-bottom: 16px;
        flex-wrap: wrap;
      }
      .post-content .post-meta i {
        margin-right: 4px;
      }
      .post-content h1 {
        font-size: 32px;
        margin-bottom: 16px;
      }
      .post-content .content {
        color: var(--text-light);
        line-height: 1.9;
      }
      .post-content .content h2 {
        font-size: 24px;
        margin: 24px 0 12px;
        color: var(--text);
      }
      .post-content .content h3 {
        font-size: 20px;
        margin: 20px 0 10px;
        color: var(--text);
      }
      .post-content .content ul {
        margin: 12px 0 16px 24px;
      }
      .post-content .content ul li {
        list-style: disc;
        margin-bottom: 6px;
      }
      .post-content .content blockquote {
        border-left: 4px solid var(--primary);
        padding: 16px 24px;
        background: var(--bg-alt);
        border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
        margin: 20px 0;
        font-style: italic;
      }
      .post-content .content img {
        max-width: 100%;
        border-radius: var(--radius-sm);
        margin: 16px 0;
      }
      .post-sidebar {
        position: sticky;
        top: 120px;
        align-self: start;
      }
      .post-sidebar .widget {
        background: var(--white);
        border-radius: var(--radius-lg);
        padding: 24px;
        margin-bottom: 24px;
        box-shadow: var(--shadow-sm);
      }
      .post-sidebar .widget h4 {
        font-size: 18px;
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 2px solid var(--primary);
      }
      .post-sidebar .widget ul {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .post-sidebar .widget ul a {
        color: var(--text-light);
        transition: var(--transition);
      }
      .post-sidebar .widget ul a:hover {
        color: var(--primary);
        padding-left: 8px;
      }
      .share-buttons {
        display: flex;
        gap: 12px;
        margin-top: 24px;
        padding-top: 24px;
        border-top: 1px solid var(--border);
      }
      .share-buttons a {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--white);
        transition: var(--transition);
      }
      .share-buttons a:hover {
        transform: translateY(-4px);
      }
      .share-buttons .facebook {
        background: #1877f2;
      }
      .share-buttons .twitter {
        background: #000;
      }
      .share-buttons .linkedin {
        background: #0a66c2;
      }
      .share-buttons .whatsapp {
        background: #25d366;
      }
      @media (max-width: 992px) {
        .post-grid {
          grid-template-columns: 1fr;
        }
        .post-sidebar {
          position: static;
        }
      }
      @media (max-width: 768px) {
        .post-content {
          padding: 24px;
        }
        .post-content h1 {
          font-size: 26px;
        }
      }
    </style>
  </head>
  <body data-page="blog-post">
    <div id="header-placeholder"></div>

    <main>
      <section class="post-section">
        <div class="container">
          <div class="post-grid">
            <div class="post-content" id="postContent">
              <!-- Dynamic content -->
            </div>
            <div class="post-sidebar">
              <div class="widget">
                <h4>Recent Posts</h4>
                <ul id="recentPosts">
                  <!-- Dynamic -->
                </ul>
              </div>
              <div class="widget">
                <h4>Categories</h4>
                <ul id="postCategories">
                  <!-- Dynamic -->
                </ul>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="footer-placeholder"></div>
    <button class="back-to-top" aria-label="Back to top">
      <i class="fas fa-chevron-up"></i>
    </button>

    <script type="module">
      import { ComponentLoader } from "./js/components.js";
      import { Utils } from "./js/utils.js";

      document.addEventListener("DOMContentLoaded", async () => {
        const loader = new ComponentLoader();
        await loader.init();
        new Utils();

        const params = new URLSearchParams(window.location.search);
        const postId = parseInt(params.get("id")) || 1;

        try {
          const response = await fetch("/data/blog.json");
          const data = await response.json();
          const posts = data.posts || [];
          const post = posts.find((p) => p.id === postId) || posts[0];

          const container = document.getElementById("postContent");
          container.innerHTML = `
          <div class="featured-image"><img src="${post.image || "assets/images/blog-placeholder.jpg"}" alt="${post.title}" /></div>
          <div class="post-meta">
            <span><i class="far fa-calendar-alt"></i> ${post.date || "January 2026"}</span>
            <span><i class="far fa-user"></i> ${post.author || "HGALLERY"}</span>
            <span><i class="far fa-folder"></i> ${post.category || "General"}</span>
            <span><i class="far fa-clock"></i> ${post.readTime || "5 min read"}</span>
          </div>
          <h1>${post.title}</h1>
          <div class="content">${post.content || "<p>Content coming soon...</p>"}</div>
          <div class="share-buttons">
            <span style="font-weight:600; display:flex; align-items:center; margin-right:8px;">Share:</span>
            <a href="https://facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}" target="_blank" class="facebook"><i class="fab fa-facebook-f"></i></a>
            <a href="https://twitter.com/intent/tweet?url=${encodeURIComponent(window.location.href)}&text=${encodeURIComponent(post.title)}" target="_blank" class="twitter"><i class="fab fa-twitter"></i></a>
            <a href="https://linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(window.location.href)}" target="_blank" class="linkedin"><i class="fab fa-linkedin-in"></i></a>
            <a href="https://wa.me/?text=${encodeURIComponent(post.title + " " + window.location.href)}" target="_blank" class="whatsapp"><i class="fab fa-whatsapp"></i></a>
          </div>
        `;

          // Recent posts
          const recentContainer = document.getElementById("recentPosts");
          recentContainer.innerHTML = posts
            .filter((p) => p.id !== postId)
            .slice(0, 4)
            .map(
              (p) => `
          <li><a href="blog-post.html?id=${p.id}">${p.title}</a></li>
        `,
            )
            .join("");

          // Categories
          const catContainer = document.getElementById("postCategories");
          const categories = [
            ...new Set(posts.map((p) => p.category || "General")),
          ];
          catContainer.innerHTML = categories
            .map(
              (cat) => `
          <li><a href="blog.html?category=${encodeURIComponent(cat)}">${cat}</a></li>
        `,
            )
            .join("");
        } catch (error) {
          console.error("Error loading post:", error);
        }
      });
    </script>
  </body>
</html>
