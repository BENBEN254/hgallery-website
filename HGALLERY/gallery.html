<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery - HGALLERY Visual Portfolio</title>
    <meta
      name="description"
      content="Browse our gallery of glass, aluminium, shower cubicles, and home decor installations."
    />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      .gallery-section {
        padding: 3rem 0;
      }
      .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 1.5rem;
      }
      .gallery-item {
        position: relative;
        border-radius: var(--radius-md);
        overflow: hidden;
        cursor: pointer;
        aspect-ratio: 1;
      }
      .gallery-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: var(--transition-slow);
      }
      .gallery-item:hover img {
        transform: scale(1.08);
      }
      .gallery-item .overlay {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: var(--transition-base);
      }
      .gallery-item:hover .overlay {
        opacity: 1;
      }
      .gallery-item .overlay i {
        color: var(--white);
        font-size: 2rem;
      }
      .gallery-filter {
        display: flex;
        flex-wrap: wrap;
        gap: 0.8rem;
        justify-content: center;
        padding: 2rem 0;
      }
      .gallery-filter button {
        padding: 0.5rem 1.5rem;
        border: 2px solid var(--gray-200);
        border-radius: var(--radius-full);
        background: transparent;
        font-weight: 600;
        font-size: 0.85rem;
        cursor: pointer;
        transition: var(--transition-fast);
      }
      .gallery-filter button:hover,
      .gallery-filter button.active {
        background: var(--primary);
        color: var(--white);
        border-color: var(--primary);
      }
      .lightbox {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.9);
        z-index: 9999;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .lightbox.active {
        display: flex;
      }
      .lightbox img {
        max-width: 90%;
        max-height: 90%;
        object-fit: contain;
      }
      .lightbox .close {
        position: absolute;
        top: 2rem;
        right: 2rem;
        color: var(--white);
        font-size: 2rem;
        cursor: pointer;
      }
      .gallery-empty {
        text-align: center;
        padding: 4rem;
        color: var(--gray-500);
      }
    </style>
  </head>
  <body data-page="gallery">
    <!-- HEADER PLACEHOLDER -->
    <div id="header-placeholder"></div>

    <!-- MAIN CONTENT -->
    <main>
      <section class="page-hero">
        <div class="container">
          <h1>Our Gallery</h1>
          <p>Visual inspiration for your next project</p>
        </div>
      </section>

      <section class="gallery-section">
        <div class="container">
          <div class="gallery-filter" id="galleryFilter">
            <button class="active" data-filter="all">All</button>
            <button data-filter="glass">Glass</button>
            <button data-filter="mirrors">Mirrors</button>
            <button data-filter="aluminium">Aluminium</button>
            <button data-filter="projects">Projects</button>
            <button data-filter="decor">Decor</button>
          </div>
          <div class="gallery-grid" id="galleryGrid">
            <!-- Loaded dynamically from gallery.json -->
          </div>
        </div>
      </section>

      <!-- Lightbox -->
      <div class="lightbox" id="lightbox">
        <span class="close" id="lightboxClose">&times;</span>
        <img id="lightboxImage" src="" alt="Gallery image" />
      </div>
    </main>

    <!-- FOOTER PLACEHOLDER -->
    <div id="footer-placeholder"></div>

    <button class="back-to-top" aria-label="Back to top">
      <i class="fas fa-chevron-up"></i>
    </button>

    <script type="module">
      import { ComponentLoader } from "./js/components.js";
      import { Gallery } from "./js/gallery.js";
      import { Utils } from "./js/utils.js";

      document.addEventListener("DOMContentLoaded", async () => {
        const loader = new ComponentLoader();
        await loader.init();
        new Utils();
        new Gallery();
      });
    </script>
  </body>
</html>
