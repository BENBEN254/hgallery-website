<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Cart - HGALLERY</title>
    <meta name="description" content="Review your shopping cart at HGALLERY." />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      .cart-section {
        padding: 3rem 0;
      }
      .cart-table {
        width: 100%;
        border-collapse: collapse;
        background: var(--white);
        border-radius: var(--radius-md);
        overflow: hidden;
        box-shadow: var(--shadow-sm);
      }
      .cart-table th {
        background: var(--dark);
        color: var(--white);
        padding: 1rem;
        text-align: left;
        font-weight: 600;
      }
      .cart-table td {
        padding: 1rem;
        border-bottom: 1px solid var(--gray-200);
        vertical-align: middle;
      }
      .cart-table .product-info {
        display: flex;
        align-items: center;
        gap: 1rem;
      }
      .cart-table .product-info img {
        width: 60px;
        height: 60px;
        object-fit: cover;
        border-radius: var(--radius-sm);
      }
      .cart-table .qty-btn {
        padding: 0.3rem 0.8rem;
        border: 1px solid var(--gray-200);
        background: transparent;
        cursor: pointer;
        border-radius: var(--radius-sm);
      }
      .cart-table .qty-input {
        width: 50px;
        text-align: center;
        padding: 0.3rem;
        border: 1px solid var(--gray-200);
        border-radius: var(--radius-sm);
      }
      .cart-table .remove-btn {
        color: var(--primary);
        cursor: pointer;
        background: none;
        border: none;
        font-size: 1.2rem;
      }
      .cart-summary {
        background: var(--white);
        padding: 2rem;
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-sm);
        margin-top: 2rem;
      }
      .cart-summary .summary-row {
        display: flex;
        justify-content: space-between;
        padding: 0.5rem 0;
      }
      .cart-summary .total {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--primary);
        border-top: 2px solid var(--gray-200);
        padding-top: 1rem;
        margin-top: 0.5rem;
      }
      .empty-cart {
        text-align: center;
        padding: 4rem 0;
      }
      .empty-cart i {
        font-size: 4rem;
        color: var(--gray-300);
        margin-bottom: 1rem;
      }
      .empty-cart h3 {
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
      }
      .empty-cart p {
        color: var(--gray-500);
      }
      @media (max-width: 768px) {
        .cart-table {
          display: block;
          overflow-x: auto;
        }
        .cart-table th,
        .cart-table td {
          padding: 0.75rem;
          font-size: 0.85rem;
        }
        .cart-table .product-info img {
          width: 40px;
          height: 40px;
        }
      }
    </style>
  </head>
  <body data-page="cart">
    <!-- HEADER PLACEHOLDER -->
    <div id="header-placeholder"></div>

    <!-- MAIN CONTENT -->
    <main>
      <section class="page-hero">
        <div class="container">
          <h1>Shopping Cart</h1>
          <p>Review your items before checkout</p>
        </div>
      </section>

      <section class="cart-section">
        <div class="container">
          <div id="cartContent">
            <!-- Cart content loaded dynamically by cart.js -->
          </div>
        </div>
      </section>
    </main>

    <!-- FOOTER PLACEHOLDER -->
    <div id="footer-placeholder"></div>

    <button class="back-to-top" aria-label="Back to top">
      <i class="fas fa-chevron-up"></i>
    </button>

    <script type="module">
      import { ComponentLoader } from "./js/components.js";
      import { Cart } from "./js/cart.js";
      import { Utils } from "./js/utils.js";

      document.addEventListener("DOMContentLoaded", async () => {
        const loader = new ComponentLoader();
        await loader.init();
        new Utils();
        new Cart();
      });
    </script>
  </body>
</html>
