<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Service Details - HGALLERY</title>
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/services.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
  </head>
  <body data-page="service">
    <!-- Header -->
    <header class="header" id="header"><!-- ... --></header>

    <main>
      <section class="service-detail">
        <div class="container">
          <div class="service-detail-grid">
            <div class="service-image">
              <img
                id="serviceMainImage"
                src="assets/images/services/placeholder.jpg"
                alt="Service image"
              />
            </div>
            <div class="service-info">
              <h1 id="serviceName">Service Name</h1>
              <p id="serviceDescription">Service description goes here.</p>
              <div class="service-features" id="serviceFeatures">
                <!-- Features loaded dynamically -->
              </div>
              <div class="service-meta">
                <div class="meta-item">
                  <i class="fas fa-tag"></i>
                  <span
                    >Price: <strong id="servicePrice">From KES 0</strong></span
                  >
                </div>
                <div class="meta-item">
                  <i class="fas fa-clock"></i>
                  <span
                    >Duration:
                    <strong id="serviceDuration">2-3 days</strong></span
                  >
                </div>
              </div>
              <a href="contact.html" class="btn btn-primary"
                >Request this Service</a
              >
            </div>
          </div>
        </div>
      </section>

      <!-- Related Services -->
      <section class="related-services">
        <div class="container">
          <h2 class="section-title">Related Services</h2>
          <div class="services-grid" id="relatedServices">
            <!-- Loaded dynamically -->
          </div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="footer"><!-- ... --></footer>

    <button class="back-to-top" aria-label="Back to top">
      <i class="fas fa-chevron-up"></i>
    </button>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
