<!-- Newsletter Component -->
<div class="newsletter-section">
  <div class="newsletter-container">
    <div class="newsletter-content">
      <div class="newsletter-icon">
        <i class="fas fa-envelope-open-text"></i>
      </div>
      <h3>Subscribe to Our Newsletter</h3>
      <p>
        Stay updated with our latest products, exclusive offers, and design
        inspiration.
      </p>
      <form class="newsletter-form" id="newsletterForm">
        <div class="form-group">
          <input
            type="email"
            id="newsletterEmail"
            placeholder="Enter your email address"
            required
          />
          <button type="submit" class="btn btn-primary">
            Subscribe <i class="fas fa-arrow-right"></i>
          </button>
        </div>
        <div class="form-check">
          <input type="checkbox" id="newsletterConsent" required />
          <label for="newsletterConsent"
            >I agree to receive marketing emails from HGALLERY</label
          >
        </div>
      </form>
      <div class="newsletter-benefits">
        <span><i class="fas fa-check-circle"></i> Exclusive offers</span>
        <span><i class="fas fa-check-circle"></i> New product alerts</span>
        <span
          ><i class="fas fa-check-circle"></i> Design tips & inspiration</span
        >
      </div>
    </div>
  </div>
</div>
